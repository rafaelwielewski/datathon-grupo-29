global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - /etc/prometheus/alerting_rules.yml

scrape_configs:
  - job_name: 'flight-delay-assistant'
    static_configs:
      - targets: ['serve:8000']
    metrics_path: '/metrics'
