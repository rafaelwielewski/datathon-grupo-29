data:
  flights_csv: "data/raw/flights.csv"
  airlines_csv: "data/raw/airlines.csv"
  airports_csv: "data/raw/airports.csv"

splits:
  train_months: [1, 2, 3, 4, 5, 6, 7, 8]
  val_months: [9, 10]
  test_months: [11, 12]

sampling:
  use_train_sampling: true
  max_samples_per_month: 200000

model:
  use_operational_delay_cols: true
  random_state: 42
  scale_pos_weight_multiplier: 0.85

catboost_params:
  iterations: 2000
  learning_rate: 0.06
  depth: 8
  min_data_in_leaf: 200
  l2_leaf_reg: 15
  loss_function: "Logloss"
  eval_metric: "Logloss"
  verbose: 100
  od_type: "Iter"
  od_wait: 200
  max_ctr_complexity: 2
  one_hot_max_size: 16
  border_count: 128
  bootstrap_type: "Bernoulli"
  subsample: 0.7
  allow_writing_files: false
  use_gpu: true
  use_gpu: false

paths:
  artifacts_dir: "data/processed/artifacts"
  data_dir: "data/processed"

target:
  name: "delayed"
  threshold_minutes: 15
