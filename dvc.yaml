stages:
  feature_store:
    cmd: python scripts/build_feature_store.py
    deps:
      - data/raw/flights.csv
      - data/raw/airlines.csv
      - data/raw/airports.csv
      - scripts/build_feature_store.py
      - src/features/feature_engineering.py
      - feature_store/feature_store.py
      - feature_store/feature_store.yaml
    outs:
      - data/processed/feature_store/flight_features.parquet
      - data/feature_store/registry.db
  train:
    cmd: python src/models/train.py
    deps:
      - data/raw/flights.csv
      - data/raw/airlines.csv
      - data/raw/airports.csv
      - src/models/train.py
      - src/models/baseline.py
      - src/features/feature_engineering.py
      - configs/model_config.yaml
    outs:
      - data/processed/artifacts/catboost_model.cbm
      - data/processed/artifacts/platt_calibrator.joblib
      - data/processed/artifacts/best_threshold.txt
      - data/processed/artifacts/metadata.json
      - data/processed/artifacts/metrics.json
      - data/processed/test_features_ref.parquet
