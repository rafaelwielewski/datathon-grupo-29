# .github/workflows/ci-cd.yml
name: Datathon CI/CD

on:
  push:
    paths: ['src/**', 'tests/**', 'evaluation/**', 'feature_store/**', 'scripts/**', 'src/serving/Dockerfile', 'Dockerfile.train']
  pull_request:
    paths: ['src/**', 'tests/**', 'evaluation/**', 'feature_store/**', 'scripts/**', 'src/serving/Dockerfile', 'Dockerfile.train']

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/ evaluation/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports

      - name: Security scan (bandit)
        run: bandit -r src/ -c pyproject.toml

      - name: Unit tests (pytest)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pytest tests/ -x \
            --cov=src \
            --cov-report=xml \
            --cov-fail-under=60 \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  deploy-staging:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Write .env from ENV_STAGING secret (staging only)
        run: echo "${{ secrets.ENV_STAGING }}" > .env

      - name: Create feature store directory (populated at runtime via DVC)
        run: mkdir -p data/feature_store

      - name: Build serving image (staging)
        run: docker build -f src/serving/Dockerfile -t datathon-serve:staging .

      - name: Run serving container (staging)
        run: |
          docker rm -f datathon-serve-staging || true
          docker run -d --rm -p 8000:8000 \
            -e MLFLOW_TRACKING_URI=http://localhost:5000 \
            --name datathon-serve-staging \
            datathon-serve:staging

      - name: Smoke test /health (staging)
        run: curl --retry 10 --retry-connrefused --retry-delay 2 http://localhost:8000/health

      - name: Stop staging container
        if: always()
        run: docker rm -f datathon-serve-staging || true
